name: Docker Build and Push - DockerHub

on:
  workflow_call:
    inputs:
      dockerhub-image:
        description: 'DockerHub image name (e.g., myusername/myimage)'
        required: true
        type: string
      docker-platform:
        description: 'Docker build platform'
        required: false
        type: string
        default: 'linux/amd64'
      build-environment:
        description: 'GitHub environment name for the build job'
        required: true
        type: string
      production-environment:
        description: 'GitHub environment name for the production deploy job (must have required reviewers configured)'
        required: true
        type: string
    secrets:
      dockerhub-username:
        description: 'DockerHub username'
        required: true
      dockerhub-token:
        description: 'DockerHub access token'
        required: true
      github-packages-token:
        description: 'GitHub packages token for private dependencies'
        required: false
    outputs:
      image:
        description: 'Full image name with tag'
        value: ${{ jobs.build.outputs.image }}

jobs:
  build:
    name: Build and Push
    environment: ${{ inputs.build-environment }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.build-image.outputs.image }}
      is-release: ${{ steps.tag.outputs.is-release }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "value=release-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "is-release=true" >> $GITHUB_OUTPUT
          else
            echo "value=development-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "is-release=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.dockerhub-username }}
          password: ${{ secrets.dockerhub-token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build-image
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          echo "🐳 Building Docker image: ${{ inputs.dockerhub-image }}:${IMAGE_TAG}"

          if [ -n "${{ secrets.github-packages-token }}" ]; then
            docker build \
              --build-arg GITHUB_TOKEN=${{ secrets.github-packages-token }} \
              --platform ${{ inputs.docker-platform }} \
              -t ${{ inputs.dockerhub-image }}:${IMAGE_TAG} .
          else
            docker build \
              --platform ${{ inputs.docker-platform }} \
              -t ${{ inputs.dockerhub-image }}:${IMAGE_TAG} .
          fi

          echo "📤 Pushing Docker image..."
          docker push ${{ inputs.dockerhub-image }}:${IMAGE_TAG}

          echo "✅ Build and push completed successfully!"
          echo "📍 Image: ${{ inputs.dockerhub-image }}:${IMAGE_TAG}"
          echo "image=${{ inputs.dockerhub-image }}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "🚀 Image pushed successfully!"
          echo "📦 Image: ${{ steps.build-image.outputs.image }}"
          echo "🔗 View on DockerHub: https://hub.docker.com/r/${{ inputs.dockerhub-image }}/tags"

  deploy-production:
    name: Deploy to Production
    needs: build
    if: needs.build.outputs.is-release == 'true'
    environment: ${{ inputs.production-environment }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Production deployment placeholder
        run: |
          echo "✅ Approved for production!"
          echo "📦 Image: ${{ needs.build.outputs.image }}"
          echo "🌍 Environment: ${{ inputs.production-environment }}"
          echo "⏳ Deployment step not yet configured."
